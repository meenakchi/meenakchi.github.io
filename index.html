<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <link rel="stylesheet" href="https://unpkg.com/98.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- desktop icons -->
  <div class="desktop">
    <div class="icon" ondblclick="openWindow('bio-window')">
      <img src="https://win98icons.alexmeub.com/icons/png/write_wordpad-0.png" alt="bio icon">
      <span>About Me</span>
    </div>
  </div>

  <!-- bio window -->
  <div class="window" id="bio-window">
    <div class="title-bar">
      <div class="title-bar-text">About Me</div>
      <div class="title-bar-controls">
        <button aria-label="Minimize"></button>
        <button aria-label="Maximize"></button>
        <button aria-label="Close" onclick="closeWindow('bio-window')"></button>
      </div>
    </div>
    <div class="window-body">
      <p>hi!! i'm [your name] — write something cute here ✨</p>
    </div>
  </div>

</body>
<script src="script.js"></script>
</html>
